<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Gerçek P2P Chat (max 4 kişi)</title>
<style>
  body { font-family: Arial; margin: 20px; }
  #chat { border:1px solid #ccc; height:300px; overflow-y:scroll; padding:5px; margin-bottom:10px; }
  #msg { width:70%; }
</style>
</head>
<body>

<h2>Gerçek P2P Chat (max 4 kişi)</h2>

<div>
  <label>İsmin: </label>
  <input id="nameInput" placeholder="İsmini gir">
  <button onclick="saveName()">Kaydet</button>
</div>

<div>
  <label>Oda Kodu: </label>
  <input id="roomInput" placeholder="Oda kodunu gir veya oluştur">
  <button onclick="joinRoom()">Katıl / Oluştur</button>
</div>

<div id="chat"></div>

<input id="msg" placeholder="Mesaj yaz">
<button onclick="sendMsg()">Gönder</button>

<script src="https://cdn.jsdelivr.net/npm/peerjs@1.4.7/dist/peerjs.min.js"></script>
<script>
let username = localStorage.getItem("username");
let room = null;
let peer = null;
let connections = [];

if(username) {
    document.getElementById("nameInput").value = username;
    addChat("Sistem: Hoşgeldin " + username);
}

function saveName() {
    username = document.getElementById("nameInput").value;
    if(!username) return alert("İsim boş olamaz!");
    localStorage.setItem("username", username);
    addChat("Sistem: Hoşgeldin " + username);
}

function addChat(msg) {
    let chatDiv = document.getElementById("chat");
    chatDiv.innerHTML += msg + "<br>";
    chatDiv.scrollTop = chatDiv.scrollHeight;
}

function joinRoom() {
    room = document.getElementById("roomInput").value;
    if(!room) return alert("Oda kodu boş olamaz!");

    // PeerJS ile bağlantı
    peer = new Peer(username + "-" + Math.floor(Math.random()*1000), {
        host: 'peerjs-server.herokuapp.com',
        secure: true,
        port: 443
    });

    peer.on('open', id => {
        addChat("Sistem: Odaya katıldın! Peer ID: " + id);
    });

    peer.on('connection', conn => {
        if(connections.length >= 3) {
            conn.close();
            return alert("Maksimum 4 kişi!");
        }
        setupConnection(conn);
    });

    // Aynı oda koduna sahip diğer kullanıcıları manuel bağlama
    // Örnek: oda kodunu başka kullanıcılar biliyor ve Peer ID giriyor
    let otherPeerID = prompt("Bağlanmak istediğin diğer peer ID'yi gir (varsa, boş bırak):");
    if(otherPeerID) {
        let conn = peer.connect(otherPeerID);
        setupConnection(conn);
    }
}

function setupConnection(conn) {
    connections.push(conn);

    conn.on('open', () => {
        addChat("Sistem: " + conn.peer + " bağlandı!");
    });

    conn.on('data', data => {
        addChat(data);
    });

    conn.on('close', () => {
        addChat("Sistem: " + conn.peer + " ayrıldı!");
        connections = connections.filter(c => c !== conn);
    });
}

function sendMsg() {
    let msg = document.getElementById("msg").value;
    if(!msg || !username) return alert("Önce isim ve mesaj gir!");
    document.getElementById("msg").value = "";
    let fullMsg = username + ": " + msg;
    addChat(fullMsg);

    connections.forEach(conn => {
        conn.send(fullMsg);
    });
}
</script>

</body>
</html>
